<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#06162b" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link rel="icon" href="icon-512.png" />
  <title>BluePeterDeparture v2.4</title>
  <style>
    :root{
      --bg:#06162b; --panel:#0b213d; --panel2:#102b4c; --text:#f8fbff; --muted:#aac2dc;
      --green:#25e36f; --red:#ff3b30; --line:rgba(255,255,255,.12); --btn:#17385f;
      --shadow:0 18px 40px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text)}
    body.day{--bg:#e9eef5;--panel:#ffffff;--panel2:#f1f5fa;--text:#071526;--muted:#31465f;--green:#007a36;--red:#c91510;--line:rgba(0,0,0,.16);--btn:#dce7f3;--shadow:0 12px 26px rgba(0,0,0,.14)}
    .app{height:100dvh;width:100vw;padding:clamp(8px,1.5vw,18px);display:grid;grid-template-rows:auto 1fr auto;gap:clamp(6px,1.2vw,14px)}
    header{display:grid;grid-template-columns:1fr auto;align-items:start;gap:12px;min-height:0}
    .brand{display:flex;align-items:center;gap:10px;min-width:0}
    .mini-flag{width:34px;height:34px;border-radius:6px;background:#0057b8;position:relative;box-shadow:inset 0 0 0 2px rgba(255,255,255,.18);flex:0 0 auto}
    .mini-flag:after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;transform:translate(-50%,-50%);background:#fff}
    .route-title{font-size:clamp(18px,2.5vw,34px);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.05}
    .sub{font-size:clamp(12px,1.4vw,18px);color:var(--muted);font-weight:650;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .clock{font-size:clamp(34px,5vw,58px);font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;line-height:1;text-align:right;letter-spacing:.02em;white-space:nowrap}
    main{min-height:0;display:grid;grid-template-columns:1.25fr .75fr;gap:clamp(8px,1.5vw,18px)}
    .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);min-height:0}
    .count-card{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(10px,2vw,26px)}
    .label{font-size:clamp(15px,2vw,28px);font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;text-align:center}
    .count{font-size:clamp(88px,18vw,210px);font-weight:950;line-height:.86;font-variant-numeric:tabular-nums;color:var(--green);text-align:center;letter-spacing:-.06em;margin:.06em 0}
    .count.red{color:var(--red)}
    .unit{font-size:clamp(28px,4.2vw,60px);font-weight:900;text-transform:uppercase;color:var(--text);line-height:1;text-align:center}
    .next-time{font-size:clamp(24px,3.5vw,48px);font-weight:900;color:var(--text);margin-top:clamp(4px,1vw,12px);font-variant-numeric:tabular-nums;text-align:center}
    .side{display:grid;grid-template-rows:auto 1fr auto;gap:clamp(8px,1.1vw,14px);min-height:0}
    .status{padding:clamp(10px,1.5vw,18px);display:grid;gap:8px;align-content:start}
    .status-line{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:clamp(14px,1.6vw,22px);font-weight:750;border-bottom:1px solid var(--line);padding-bottom:8px}
    .dot{display:inline-block;width:.8em;height:.8em;border-radius:50%;background:var(--green);margin-right:.35em;vertical-align:-.05em}.dot.red{background:var(--red)}
    .controls{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,1vw,12px);align-content:center;padding:clamp(10px,1.4vw,18px)}
    button,select{font:inherit;color:var(--text);background:var(--btn);border:1px solid var(--line);border-radius:14px;padding:clamp(10px,1.6vw,18px);font-weight:850;min-height:48px}
    body.day button,body.day select{color:#071526;background:#dce7f3}
    button:active{transform:scale(.98)}
    .settings{padding:clamp(10px,1.5vw,18px);display:none;gap:10px}.settings.open{display:grid}
    .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.settings select{grid-column:1/-1;width:100%}
    footer{display:flex;align-items:center;justify-content:center;min-height:24px;font-size:clamp(14px,1.5vw,22px);font-weight:850;color:var(--muted);white-space:nowrap}
    footer .tiny-flag{width:1.2em;height:1.2em;border-radius:.16em;background:#0057b8;position:relative;display:inline-block;margin-right:.45em;vertical-align:-.22em;box-shadow:inset 0 0 0 1px rgba(255,255,255,.3)}
    footer .tiny-flag:after{content:"";position:absolute;left:50%;top:50%;width:48%;height:48%;transform:translate(-50%,-50%);background:#fff}
    @media (max-width: 820px){
      .app{gap:7px;padding:8px} main{grid-template-columns:1fr;grid-template-rows:1fr auto}.side{grid-template-rows:auto auto}.status{display:none}.controls{grid-template-columns:repeat(4,1fr);padding:8px}.controls button{font-size:clamp(12px,2.5vw,16px);padding:8px;min-height:42px}.count{font-size:clamp(82px,28vw,170px)}.unit{font-size:clamp(24px,8vw,48px)}.clock{font-size:clamp(30px,7vw,46px)}.route-title{font-size:clamp(18px,4vw,28px)}.sub{display:none}.settings-grid{grid-template-columns:repeat(3,1fr)}
    }
    @media (max-height: 520px){
      .app{padding:6px;gap:5px}.brand .mini-flag{width:26px;height:26px}.route-title{font-size:20px}.clock{font-size:34px}.count-card{padding:6px}.count{font-size:clamp(64px,20vw,130px)}.unit{font-size:26px}.next-time{font-size:24px}.controls{padding:6px;gap:6px}.controls button{min-height:36px;padding:6px;font-size:13px}footer{font-size:13px;min-height:18px}.settings{position:absolute;left:6px;right:6px;bottom:28px;z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
    }
    @media (max-width: 430px){
      header{grid-template-columns:1fr}.clock{text-align:left;font-size:32px}.controls{grid-template-columns:1fr 1fr}.count{font-size:clamp(86px,38vw,150px)}.unit{font-size:34px}.next-time{font-size:30px}footer{font-size:14px}.settings-grid{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="mini-flag" aria-hidden="true"></div>
      <div style="min-width:0">
        <div class="route-title" id="routeName">Skenäsleden</div>
        <div class="sub" id="fromHarbor">Nästa avgång</div>
      </div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <section class="card count-card">
      <div class="label" id="mainLabel">Tid kvar</div>
      <div class="count" id="count">--</div>
      <div class="unit" id="unit">minuter</div>
      <div class="next-time" id="nextTime">--:--</div>
    </section>
    <aside class="side">
      <section class="card status">
        <div class="status-line"><span><span class="dot" id="apiDot"></span>Data</span><span id="apiStatus">Hämtar</span></div>
        <div class="status-line"><span>Led</span><span id="routeIdText">--</span></div>
        <div class="status-line"><span>Ljud</span><span id="soundStatus">Tryck test</span></div>
      </section>
      <section class="card controls">
        <button id="testFive">Test 5 min</button>
        <button id="testDeparture">Test avgång</button>
        <button id="wakeBtn">Skärm vaken</button>
        <button id="settingsBtn">Inställningar</button>
      </section>
      <section class="card settings" id="settings">
        <select id="routeSelect" aria-label="Välj färjeled"></select>
        <div class="settings-grid">
          <button id="dayBtn">Dag</button>
          <button id="nightBtn">Natt</button>
          <button id="autoBtn">Auto</button>
        </div>
      </section>
    </aside>
  </main>
  <footer><span class="tiny-flag"></span>BluePeterDeparture v2.4</footer>
</div>
<script>
'use strict';
const API_KEY='24b95262774241ad8dbaf8ab05cf070a';
const API_URL='https://api.trafikinfo.trafikverket.se/v2/data.json';
const DEFAULT_ROUTE_ID=19;
let routeId=parseInt(localStorage.getItem('bpd_routeid')||DEFAULT_ROUTE_ID,10);
let nextDeparture=null, currentAnnouncementKey='', fivePlayed=false, depPlayed=false, postDepartureUntil=null, wakeLock=null, audioCtx=null;
const el=id=>document.getElementById(id);
const clockEl=el('clock'), routeNameEl=el('routeName'), fromHarborEl=el('fromHarbor'), countEl=el('count'), unitEl=el('unit'), nextTimeEl=el('nextTime'), labelEl=el('mainLabel'), apiStatusEl=el('apiStatus'), apiDotEl=el('apiDot'), routeIdTextEl=el('routeIdText'), soundStatusEl=el('soundStatus'), settingsEl=el('settings'), routeSelectEl=el('routeSelect');
function pad(n){return String(n).padStart(2,'0')}
function fmtClock(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`}
function fmtHM(d){return `${pad(d.getHours())}:${pad(d.getMinutes())}`}
function applyTheme(mode){localStorage.setItem('bpd_theme',mode); const useDay = mode==='day' || (mode==='auto' && window.matchMedia('(prefers-color-scheme: light)').matches); document.body.classList.toggle('day',useDay)}
applyTheme(localStorage.getItem('bpd_theme')||'night');
function ensureAudio(){if(!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)()} if(audioCtx.state==='suspended') audioCtx.resume(); soundStatusEl.textContent='OK'}
function bell(time){ensureAudio(); const ctx=audioCtx; const o1=ctx.createOscillator(), o2=ctx.createOscillator(), g=ctx.createGain(), f=ctx.createBiquadFilter(); o1.type='sine'; o2.type='triangle'; o1.frequency.setValueAtTime(740,time); o2.frequency.setValueAtTime(1480,time); f.type='bandpass'; f.frequency.setValueAtTime(900,time); f.Q.setValueAtTime(2.2,time); g.gain.setValueAtTime(0.0001,time); g.gain.exponentialRampToValueAtTime(0.85,time+0.018); g.gain.exponentialRampToValueAtTime(0.0001,time+1.15); o1.connect(f); o2.connect(f); f.connect(g); g.connect(ctx.destination); o1.start(time); o2.start(time); o1.stop(time+1.2); o2.stop(time+1.2)}
function playBells(n){ensureAudio(); const start=audioCtx.currentTime+0.04; for(let i=0;i<n;i++) bell(start+i*0.62)}
async function apiRequest(xml){const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/xml'},body:xml}); if(!res.ok) throw new Error('API '+res.status); return await res.json()}
async function getRoutes(){try{const xml='<REQUEST><LOGIN authenticationkey="'+API_KEY+'" /><QUERY objecttype="FerryRoute" schemaversion="1.2" orderby="Name asc"><INCLUDE>Name</INCLUDE><INCLUDE>Id</INCLUDE></QUERY></REQUEST>'; const data=await apiRequest(xml); const routes=data.RESPONSE.RESULT[0].FerryRoute||[]; routeSelectEl.innerHTML=''; routes.forEach(r=>{const opt=document.createElement('option'); opt.value=r.Id; opt.textContent=r.Name; if(r.Id===routeId) opt.selected=true; routeSelectEl.appendChild(opt)})}catch(e){console.warn(e)}}
async function getDeparture(){try{const xml='<REQUEST><LOGIN authenticationkey="'+API_KEY+'" /><QUERY limit="1" objecttype="FerryAnnouncement" schemaversion="1.2" orderby="DepartureTime"><FILTER><EQ name="Route.Id" value="'+routeId+'" /><GT name="DepartureTime" value="$now" /></FILTER><INCLUDE>DepartureTime</INCLUDE><INCLUDE>Route.Name</INCLUDE><INCLUDE>Route.Id</INCLUDE><INCLUDE>FromHarbor.Name</INCLUDE></QUERY></REQUEST>'; const data=await apiRequest(xml); const a=data.RESPONSE.RESULT[0].FerryAnnouncement[0]; const key=a.DepartureTime+'-'+a.Route.Id; if(key!==currentAnnouncementKey){currentAnnouncementKey=key; fivePlayed=false; depPlayed=false; postDepartureUntil=null} nextDeparture=new Date(a.DepartureTime); routeNameEl.textContent=a.Route.Name; fromHarborEl.textContent='Från '+a.FromHarbor.Name; nextTimeEl.textContent='Nästa avgång '+fmtHM(nextDeparture); routeIdTextEl.textContent=a.Route.Id; apiStatusEl.textContent='OK'; apiDotEl.classList.remove('red')}catch(e){apiStatusEl.textContent='Fel'; apiDotEl.classList.add('red'); console.warn(e)}}
function updateTime(){const now=new Date(); clockEl.textContent=fmtClock(now); if(!nextDeparture){countEl.textContent='--'; unitEl.textContent='minuter'; return} const diffSec=Math.floor((nextDeparture.getTime()-now.getTime())/1000);
  if(diffSec<=300 && diffSec>295 && !fivePlayed){playBells(5); fivePlayed=true}
  if(diffSec<=0 && !depPlayed){playBells(3); depPlayed=true; postDepartureUntil=new Date(nextDeparture.getTime()+59000)}
  if(diffSec<0 && postDepartureUntil && now<=postDepartureUntil){labelEl.textContent='Avgång passerad'; countEl.textContent='-'+Math.min(59,Math.abs(diffSec)); unitEl.textContent='sekunder'; countEl.classList.add('red'); return}
  if(diffSec<-59){getDeparture(); return}
  labelEl.textContent='Tid kvar'; const abs=Math.max(0,diffSec); if(abs<120){countEl.textContent=abs; unitEl.textContent='sekunder'} else {countEl.textContent=Math.floor(abs/60); unitEl.textContent='minuter'} countEl.classList.toggle('red', abs<=300); }
function setup(){el('testFive').onclick=()=>playBells(5); el('testDeparture').onclick=()=>playBells(3); el('settingsBtn').onclick=()=>settingsEl.classList.toggle('open'); el('dayBtn').onclick=()=>applyTheme('day'); el('nightBtn').onclick=()=>applyTheme('night'); el('autoBtn').onclick=()=>applyTheme('auto'); routeSelectEl.onchange=()=>{routeId=parseInt(routeSelectEl.value,10); localStorage.setItem('bpd_routeid',routeId); currentAnnouncementKey=''; getDeparture()}; el('wakeBtn').onclick=async()=>{try{if('wakeLock'in navigator){wakeLock=await navigator.wakeLock.request('screen'); el('wakeBtn').textContent='Skärm vaken ✓'}}catch(e){console.warn(e)}}; document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible') getDeparture()}); getRoutes(); getDeparture(); setInterval(updateTime,1000); setInterval(getDeparture,30000)}
setup();
</script>
</body>
</html>
